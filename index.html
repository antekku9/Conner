    <meta name="thumbnail" content="https://conner.pl/src/assets/salon-conner.jpg" />
    <link rel="image_src" href="./src/assets/salon-conner.jpg" />
    
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://conner.pl" />
    <meta property="og:title" content="Conner - Salon i Serwis Komputerowy Łódź | Kompleksowe Usługi IT" />
    <meta property="og:description" content="Profesjonalny serwis komputerowy w Łodzi. Obsługa IT firm, naprawą sprzętu, wynajem drukarek i kserokopiarek." />
    <meta property="og:image" content="https://conner.pl/src/assets/salon-conner.jpg" />
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Conner Sp. z o.o.",
      "image": "https://conner.pl/src/assets/salon-conner.jpg",
      "@id": "https://conner.pl",
      "url": "https://conner.pl",
      "telephone": "+48426319420",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "ul. Doktora Seweryna Sterlinga 27/29",
        "addressLocality": "Łódź",
        "postalCode": "90-212",
        "addressCountry": "PL"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 51.77611,
        "longitude": 19.46333
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
          "opens": "09:00",
          "closes": "17:00"
        }
      ]
    }
    </script>

    <script>
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>

    <script>
      (function() {
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
